name: React Build

on:
  push:
    branches: [main]
    paths:
      - "packages/react-treeselectjs/**"
      - ".github/workflows/react-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/react-treeselectjs/**"
      - ".github/workflows/react-build.yml"


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build (react package)
        run: pnpm --filter react-treeselectjs... run build
