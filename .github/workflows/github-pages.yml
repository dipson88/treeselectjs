name: Deploy to GitHub Pages

on:
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp -r packages/treeselectjs/demo/* deploy/
          cp -r packages/treeselectjs/app deploy/
          cp -r packages/treeselectjs/public deploy/
          sed -i "s|'../app/|'./app/|g" deploy/index.js
          sed -i 's|"../app/|"./app/|g' deploy/index.js
          sed -i 's|../app/|./app/|g' deploy/index.css

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "deploy"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
